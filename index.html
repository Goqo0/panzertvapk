<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>PanzerSports</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<style>
/* ==========================================================
   DEĞİŞKENLER
========================================================== */
:root{
  --bg:#0a0a0a;--surface:#171717;--text:#f9fafb;--muted:#9ca3af;
  --border:#262626;--primary:#22c55e;--primary-dark:#16a34a;--primary-bg:#064e3b;
  --scroll:#404040;
}
[data-theme="light"]{
  --bg:#f3f4f6;--surface:#fff;--text:#111827;--muted:#6b7280;
  --border:#e5e7eb;--primary:#16a34a;--primary-dark:#15803d;--primary-bg:#dcfce7;
  --scroll:#cbd5e1;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);-webkit-user-select:none;user-select:none;}
body{display:flex;flex-direction:column;}

/* ==========================================================
   HEADER
========================================================== */
header{background:var(--surface);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;z-index:100;}
.logo{display:flex;align-items:center;gap:8px;font-size:18px;}
.logo-icon{background:var(--primary);color:#fff;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;}
.logo-text-p{color:var(--text);font-weight:800;}
.logo-text-s{color:var(--primary);font-weight:800;}
.hdr-btn{background:transparent;border:none;color:var(--muted);width:38px;height:38px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .15s;}
.hdr-btn:hover{color:var(--primary);}

/* ==========================================================
   KATEGORİ ÇUBUĞU
========================================================== */
#cat-bar{display:flex;gap:8px;padding:10px 12px;overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
#cat-bar::-webkit-scrollbar{display:none;}
.cat-btn{padding:8px 18px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.cat-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;}
.cat-btn:hover:not(.active){border-color:var(--primary);color:var(--primary);}
/* TV focus: kategori butonu */
.cat-btn.tv-focus{background:var(--primary)!important;border-color:var(--primary)!important;color:#fff!important;box-shadow:0 0 0 2px #fff,0 0 12px var(--primary)!important;outline:none!important;}

/* ==========================================================
   KANAL IZGARASİ
========================================================== */
#grid{flex:1;overflow-y:auto;padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:12px;-webkit-overflow-scrolling:touch;}
.card{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 12px 14px;border-radius:16px;background:var(--surface);border:1.5px solid var(--border);cursor:pointer;transition:border-color .15s,box-shadow .15s,background .15s;text-align:center;gap:10px;min-height:105px;position:relative;overflow:hidden;}
.card::after{content:'';position:absolute;top:0;left:12px;right:12px;height:2px;background:var(--primary);border-radius:0 0 2px 2px;transform:scaleX(0);transition:transform .2s;}
.card:hover::after,.card.active::after{transform:scaleX(1);}
.card:hover{border-color:var(--primary);box-shadow:0 4px 18px rgba(34,197,94,.12);}
.card.active{border-color:var(--primary);background:var(--primary-bg);}
/* TV focus: kanal kartı */
.card.tv-focus{border-color:var(--primary)!important;background:var(--primary-bg)!important;box-shadow:0 0 0 2px var(--primary),0 0 18px rgba(34,197,94,.5)!important;outline:none!important;}
.card-logo{width:58px;height:58px;border-radius:12px;background:transparent;overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.card-logo img{width:100%;height:100%;object-fit:contain;border-radius:10px;display:block;}
.card-name{font-size:11.5px;font-weight:700;color:var(--text);line-height:1.3;word-break:break-word;}
.card-qual{font-size:10px;color:var(--muted);margin-top:1px;}

/* ==========================================================
   PLAYER OVERLAY
========================================================== */
#player-overlay{display:none;position:fixed;inset:0;background:#000;z-index:5000;}
#player-overlay.active{display:block;}
#pvideo{width:100%;height:100%;object-fit:contain;background:#000;position:absolute;inset:0;z-index:1;display:block;}

/* ==========================================================
   LOADING SPINNER — siyah bg + yeşil dönen simge
========================================================== */
#pspinner{
  display:none;position:absolute;inset:0;z-index:8;
  align-items:center;justify-content:center;
  background:#000; /* tamamen siyah arka plan */
  flex-direction:column;gap:18px;
}
#pspinner.show{display:flex;}
#pspinner-ring{
  width:60px;height:60px;
  border:4px solid rgba(34,197,94,.2);
  border-top-color:#22c55e;
  border-radius:50%;
  animation:pspin .8s linear infinite;
}
@keyframes pspin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
#pspinner-text{color:rgba(255,255,255,.55);font-size:12px;font-weight:600;letter-spacing:.4px;}

/* Embed */
#pembed{display:none;position:absolute;inset:0;z-index:10;}
#pembed-iframe{width:100%;height:100%;border:none;background:#000;}
#pembed-fs-btn{position:absolute;bottom:14px;right:14px;z-index:20;width:42px;height:42px;border-radius:50%;background:rgba(0,0,0,.55);border:1.5px solid rgba(255,255,255,.3);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#pembed-fs-btn:hover{background:var(--primary);}
/* Controls */
#pctrl{display:none;position:absolute;inset:0;z-index:20;pointer-events:none;
  background:linear-gradient(180deg,rgba(0,0,0,.72) 0%,transparent 18%),linear-gradient(0deg,rgba(0,0,0,.82) 0%,transparent 28%);}
#pctrl.visible{display:block;pointer-events:auto;}
#pctrl-top{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:14px;padding:18px 22px;}
.pbtn-back{width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.45);border:1.5px solid rgba(255,255,255,.18);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;backdrop-filter:blur(6px);}
.pbtn-back:hover{background:var(--primary);border-color:var(--primary);}
#pctrl-name{color:#fff;font-size:15px;font-weight:700;text-shadow:0 1px 8px rgba(0,0,0,.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
#plive-badge{background:rgba(220,38,38,.9);color:#fff;font-size:10px;font-weight:800;letter-spacing:.6px;padding:3px 9px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;gap:5px;}
#plive-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:ldot 1.3s ease-in-out infinite;}
@keyframes ldot{0%,100%{opacity:1}50%{opacity:.25}}
#pctrl-bottom{position:absolute;bottom:0;left:0;right:0;padding:0 22px 20px;display:flex;flex-direction:column;gap:11px;}
#pbar-row{display:flex;align-items:center;gap:10px;}
#pbar-bg{flex:1;height:2.5px;background:rgba(255,255,255,.18);border-radius:3px;overflow:hidden;}
#pbar-fill{height:100%;background:var(--primary);border-radius:3px;width:100%;}
#pbtn-row{display:flex;align-items:center;justify-content:space-between;}
#pbtn-left,#pbtn-right{display:flex;align-items:center;gap:10px;}
.pctrl-btn{width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.42);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .1s;outline:none;flex-shrink:0;backdrop-filter:blur(6px);}
.pctrl-btn:hover,.pctrl-btn.focused{background:var(--primary);transform:scale(1.07);}
#pvol-group{display:flex;align-items:center;gap:8px;}
#pvol-slider{-webkit-appearance:none;appearance:none;width:68px;height:3px;border-radius:3px;background:rgba(255,255,255,.28);outline:none;cursor:pointer;}
#pvol-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:13px;height:13px;border-radius:50%;background:#fff;cursor:pointer;}
body.tv-mode #pvol-slider{display:none;}
.pctrl-btn.tv-focused{background:var(--primary)!important;box-shadow:0 0 16px rgba(34,197,94,.6)!important;transform:scale(1.1)!important;}

/* TV: cursor gizle */
body.tv-mode *{cursor:none!important;}
</style>
</head>

const isTV = /Android TV|SMART-TV|SmartTV|Tizen|webOS|NetCast|AFTS|AFTB|AFTMM|HbbTV|CrKey|GoogleTV|Chromecast|BRAVIA|PHILIPSTV|LOEWE|VESTEL|ARCELIK/i.test(navigator.userAgent)
  || (typeof Android !== 'undefined' && window.screen && window.screen.width >= 960 && !('ontouchstart' in window));
if (isTV) {
  document.body.classList.add('tv-mode');
  document.documentElement.style.cursor = 'none';
}

/* ==========================================================
   VERİ
========================================================== */
const parseList = (id, pre) => {
  try {
    return document.getElementById(id).textContent.trim().split('\n')
      .filter(l => l.trim()).map((l, i) => {
        const p = l.split('|').map(x => x.trim());
        return { id:pre+i, name:p[0]||'', cat:p[1]||'', qual:p[2]||'', url:p[3]||'', logo:p[4]||'' };
      });
  } catch(e) { return []; }
};
const channels = parseList('kolay-kanal-listesi','ch');
const matches  = parseList('kolay-mac-listesi','mt');

/* ==========================================================
   KATEGORİ
========================================================== */
let activeCat = 'Tümü', activeId = null;

function buildCatBar() {
  const cats = ['Tümü'];
  channels.forEach(c => { if (c.cat && !cats.includes(c.cat)) cats.push(c.cat); });
  const bar = document.getElementById('cat-bar');
  bar.innerHTML = cats.map(cat =>
    `<button class="cat-btn${cat==='Tümü'?' active':''}" onclick="setCat('${cat}')">${cat}</button>`
  ).join('');
  if (matches.length) {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = 'Maç Listesi';
    btn.onclick = () => setCat('__MAC__');
    bar.appendChild(btn);
  }
}

function setCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => {
    const t = b.textContent.trim();
    b.classList.toggle('active', t === cat || (cat==='__MAC__' && t==='Maç Listesi'));
  });
  renderGrid();
}

/* ==========================================================
   IZGARA
========================================================== */
function renderGrid() {
  const isMac = activeCat === '__MAC__';
  const src   = isMac ? matches : channels;
  const list  = isMac ? src : src.filter(c => activeCat==='Tümü' || c.cat===activeCat);
  document.getElementById('grid').innerHTML = list.map(c =>
    `<div class="card${activeId===c.id?' active':''}" onclick="playChannel('${c.id}','${isMac?'m':'c'}')" data-id="${c.id}">
      <div class="card-logo"><img src="${c.logo}" loading="lazy" onerror="this.style.display='none'"></div>
      <div>
        <div class="card-name">${c.name}</div>
        <div class="card-qual">${c.qual}</div>
      </div>
    </div>`
  ).join('');
  if (isTV) setTimeout(() => tvSetFocus(0), 80);
}

/* ==========================================================
   PLAY
========================================================== */
let hlsInst = null, pCtrlTimer = null, pIsEmbed = false;
const pvid   = document.getElementById('pvideo');
const pspin  = document.getElementById('pspinner');
const pctrl  = document.getElementById('pctrl');
const pembed = document.getElementById('pembed');

function playChannel(id, src) {
  activeId = id;
  const pool = src==='m' ? matches : channels;
  const item = pool.find(c => c.id===id) || [...channels,...matches].find(c=>c.id===id);
  if (!item) return;
  renderGrid();

  /* Temizle */
  if (hlsInst) { try{hlsInst.destroy();}catch(e){} hlsInst=null; }
  try { pvid.pause(); pvid.removeAttribute('src'); pvid.load(); } catch(e) {}
  pembed.style.display='none';
  try { document.getElementById('pembed-iframe').src=''; } catch(e) {}
  pctrl.classList.remove('visible');
  pctrl.style.display='none';

  /* Player overlay aç — spinner hemen görünür (siyah bg) */
  document.getElementById('player-overlay').classList.add('active');
  document.getElementById('pctrl-name').textContent = item.name;
  pspin.classList.add('show');

  /* URL boşsa hata göster, çık */
  if (!item.url) {
    pspin.classList.remove('show');
    return;
  }

  const isHLS = item.url.includes('.m3u8') || item.url.includes('checklist') ||
                item.url.includes('proxy') || item.url.includes('m3u') ||
                item.url.includes('mono.m3u8');

  if (!isHLS) {
    /* Embed/iframe */
    pIsEmbed = true;
    pembed.style.display = 'block';
    document.getElementById('pembed-iframe').src = item.url;
    pspin.classList.remove('show');
  } else {
    pIsEmbed = false;
    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
      hlsInst = new Hls({
        enableWorker: true,
        lowLatencyMode: false,
        maxBufferLength: 30,
        maxMaxBufferLength: 60,
        xhrSetup: function(xhr) { xhr.withCredentials = false; }
      });
      hlsInst.loadSource(item.url);
      hlsInst.attachMedia(pvid);
      hlsInst.on(Hls.Events.MANIFEST_PARSED, function() {
        pvid.play().catch(function() {});
      });
      hlsInst.on(Hls.Events.ERROR, function(event, data) {
        if (data.fatal) {
          switch(data.type) {
            case Hls.ErrorTypes.NETWORK_ERROR:
              try { hlsInst.startLoad(); } catch(e) {}
              break;
            case Hls.ErrorTypes.MEDIA_ERROR:
              try { hlsInst.recoverMediaError(); } catch(e) {}
              break;
            default:
              pspin.classList.remove('show');
              break;
          }
        }
      });
    } else if (pvid.canPlayType('application/vnd.apple.mpegurl')) {
      /* Safari / native HLS (LG TV, iOS) */
      pvid.src = item.url;
      pvid.load();
      pvid.play().catch(function() {});
    } else {
      /* Native fallback */
      pvid.src = item.url;
      pvid.load();
      pvid.play().catch(function() {});
    }
  }

  /* TV: otomatik tam ekran */
  if (isTV) {
    const ov = document.getElementById('player-overlay');
    setTimeout(function() {
      try {
        (ov.requestFullscreen || ov.webkitRequestFullscreen ||
         ov.mozRequestFullScreen || ov.msRequestFullscreen ||
         function(){}).call(ov);
      } catch(e) {}
    }, 300);
  }
}

pvid.addEventListener('playing', function() { pspin.classList.remove('show'); showPCtrl(); });
pvid.addEventListener('waiting', function() { pspin.classList.add('show'); });
pvid.addEventListener('play',  function() {
  var icon = document.getElementById('pplay-icon');
  if (icon) icon.innerHTML='<rect x="6" y="4" width="4" height="16" rx="1.5"/><rect x="14" y="4" width="4" height="16" rx="1.5"/>';
});
pvid.addEventListener('pause', function() {
  var icon = document.getElementById('pplay-icon');
  if (icon) icon.innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';
});
pvid.addEventListener('error', function() {
  pspin.classList.remove('show');
});

function showPCtrl() {
  pctrl.classList.add('visible');
  pctrl.style.display = 'block';
  clearTimeout(pCtrlTimer);
  pCtrlTimer = setTimeout(function() { pctrl.classList.remove('visible'); }, 3500);
}
document.getElementById('player-overlay').addEventListener('touchstart', function() { if(!pIsEmbed) showPCtrl(); }, {passive:true});
document.getElementById('player-overlay').addEventListener('click',      function() { if(!pIsEmbed) showPCtrl(); });

function closePlayer() {
  document.getElementById('player-overlay').classList.remove('active');
  pctrl.style.display='none';
  pctrl.classList.remove('visible');
  pspin.classList.remove('show');
  if (hlsInst) { try{hlsInst.destroy();}catch(e){} hlsInst=null; }
  try { pvid.pause(); pvid.removeAttribute('src'); pvid.load(); } catch(e) {}
  pembed.style.display='none';
  try { document.getElementById('pembed-iframe').src=''; } catch(e) {}
  try {
    if (document.fullscreenElement || document.webkitFullscreenElement)
      (document.exitFullscreen || document.webkitExitFullscreen).call(document).catch(function(){});
  } catch(e) {}
  if (isTV) setTimeout(function() { tvSyncFocus(); }, 100);
}

function pTogglePlay() {
  try { pvid.paused ? pvid.play() : pvid.pause(); } catch(e) {}
}
function pToggleMute() {
  pvid.muted = !pvid.muted;
  var ico = document.getElementById('pvol-icon');
  if (!ico) return;
  ico.innerHTML = pvid.muted
    ? '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>'
    : '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>';
}
function pSetVol(v) {
  try { pvid.volume=parseInt(v)/100; pvid.muted=parseInt(v)===0; } catch(e) {}
}
function pToggleFs() {
  var ov  = document.getElementById('player-overlay');
  var ico = document.getElementById('pfs-icon');
  try {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      (ov.requestFullscreen||ov.webkitRequestFullscreen).call(ov);
      if (ico) ico.innerHTML='<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>';
    } else {
      (document.exitFullscreen||document.webkitExitFullscreen).call(document);
      if (ico) ico.innerHTML='<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m8 0h3a2 2 0 0 0 2-2v-3"/>';
    }
  } catch(e) {}
}
function playerEmbedFs() {
  var ov = document.getElementById('player-overlay');
  try { (ov.requestFullscreen||ov.webkitRequestFullscreen).call(ov); } catch(e) {}
}

/* ==========================================================
   TV D-PAD NAVİGASYON
========================================================== */
let tvZone = 'grid', tvIdx = -1;

function tvGetItems() {
  if (tvZone === 'cat') return Array.from(document.querySelectorAll('#cat-bar .cat-btn'));
  return Array.from(document.querySelectorAll('#grid .card'));
}
function tvClearFocus() {
  document.querySelectorAll('.tv-focus').forEach(function(el) { el.classList.remove('tv-focus'); });
}
function tvSetFocus(idx) {
  var items = tvGetItems();
  if (!items.length) return;
  tvClearFocus();
  tvIdx = Math.max(0, Math.min(idx, items.length-1));
  items[tvIdx].classList.add('tv-focus');
  items[tvIdx].scrollIntoView({ block:'nearest', behavior:'smooth' });
}
function tvSyncFocus() {
  if (!isTV) return;
  tvZone = 'grid';
  var items = tvGetItems();
  if (!items.length) { tvIdx=-1; return; }
  var ai = items.findIndex(function(el) { return el.dataset.id === activeId; });
  tvSetFocus(ai >= 0 ? ai : Math.max(0, Math.min(tvIdx, items.length-1)));
}

document.addEventListener('keydown', function(e) {
  if (!isTV) return;
  var key  = e.key  || '';
  var code = e.keyCode || 0;
  var DOWN  = key==='ArrowDown'  || code===40;
  var UP    = key==='ArrowUp'    || code===38;
  var RIGHT = key==='ArrowRight' || code===39;
  var LEFT  = key==='ArrowLeft'  || code===37;
  var ENTER = key==='Enter'      || code===13;
  var BACK  = key==='Backspace'||key==='Back'||key==='GoBack'||code===8||code===461||code===10009;

  /* ── Player açıkken ── */
  if (document.getElementById('player-overlay').classList.contains('active')) {
    if (BACK)  { e.preventDefault(); closePlayer(); }
    if (ENTER) { e.preventDefault(); showPCtrl(); }
    return;
  }

  e.preventDefault();

  /* ── Kanal listesindeyken geri tuşu → direkt çıkış (modal yok) ── */
  if (BACK) {
    doExit();
    return;
  }

  var items = tvGetItems();
  if (!items.length) return;
  if (tvIdx < 0) { tvSetFocus(0); return; }

  var inCat  = tvZone === 'cat';
  var inGrid = tvZone === 'grid';

  if (DOWN) {
    if (inCat)  { tvZone='grid'; tvIdx=-1; tvSetFocus(0); }
    else         { tvSetFocus(tvIdx + 2); }
  } else if (UP) {
    if (inGrid && tvIdx < 2) { tvZone='cat'; tvIdx=-1; tvSetFocus(0); }
    else if (inGrid)          { tvSetFocus(tvIdx - 2); }
  } else if (RIGHT) {
    tvSetFocus(tvIdx + 1);
  } else if (LEFT) {
    tvSetFocus(tvIdx - 1);
  } else if (ENTER) {
    if (items[tvIdx]) items[tvIdx].click();
  }
});

/* ==========================================================
   BACK BUTTON (Median.co / Cordova / WebView)
========================================================== */
document.addEventListener('backbutton', function(e) {
  e.preventDefault();
  if (document.getElementById('player-overlay').classList.contains('active')) {
    closePlayer();
    return;
  }
  /* Kanal listesindeyken: direkt çıkış, modal yok */
  doExit();
}, false);

window.addEventListener('popstate', function(e) {
  e.preventDefault();
  if (document.getElementById('player-overlay').classList.contains('active')) {
    closePlayer();
    history.pushState(null,'',location.href);
    return;
  }
  /* Telefon nav çubuğu geri tuşu: kanal listesindeyken direkt çıkış */
  doExit();
  history.pushState(null,'',location.href);
});
history.pushState(null,'',location.href);

/* ==========================================================
   ÇIKIŞ — Modal yok, direkt kapat
========================================================== */
function doExit() {
  try {
    if (window.PanzerApp && window.PanzerApp.exitApp) { window.PanzerApp.exitApp(); return; }
  } catch(e) {}
  try {
    if (navigator.app && navigator.app.exitApp) { navigator.app.exitApp(); return; }
  } catch(e) {}
  try { window.close(); } catch(e) {}
  /* Android WebView son çare */
  try { history.go(-(history.length)); } catch(e) {}
}

/* ==========================================================
   MODALLAR
========================================================== */
function openDlModal()  { document.getElementById('dl-modal').style.display='flex'; }
function closeDlModal() { document.getElementById('dl-modal').style.display='none'; }
function toggleTheme() {
  var d = document.documentElement;
  d.setAttribute('data-theme', d.getAttribute('data-theme')==='dark'?'light':'dark');
}

/* ==========================================================
   BAŞLAT
========================================================== */
try {
  buildCatBar();
  renderGrid();
} catch(e) {
  /* Crash önleyici — sayfa yine de yüklensin */
  console.error('PanzerSports init error:', e);
}
</script>
